  try {
    const v = JSON.parse(localStorage.getItem('sav_venues')||'null');
    const r = JSON.parse(localStorage.getItem('sav_reviews')||'null');
    return { venues: v||SEED_VENUES, reviews: r||SEED_REVIEWS };
  } catch { return { venues:SEED_VENUES, reviews:SEED_REVIEWS }; }
};
const saveVenues = v => localStorage.setItem('sav_venues', JSON.stringify(v));
const saveReviews = r => localStorage.setItem('sav_reviews', JSON.stringify(r));

// ── useWindowSize ──────────────────────────────────────────
const useWindowSize=()=>{
  const [w,setW]=React.useState(window.innerWidth);
  React.useEffect(()=>{const h=()=>setW(window.innerWidth);window.addEventListener('resize',h);return()=>window.removeEventListener('resize',h);},[]);
  return w;
};

// ── LeafletMap ─────────────────────────────────────────────
const LeafletMap=({venues,activeFilter,onVenueSelect,highlightId,onHighlight})=>{
  const mapRef=React.useRef(null);
  const instRef=React.useRef(null);
  const markersRef=React.useRef({});

  const pinSvg=(color,scale=1)=>{const w=Math.round(28*scale),h=Math.round(36*scale);return`<svg width="${w}" height="${h}" viewBox="0 0 28 36" xmlns="http://www.w3.org/2000/svg"><path d="M14 0C6.268 0 0 6.268 0 14c0 9.333 14 22 14 22S28 23.333 28 14C28 6.268 21.732 0 14 0z" fill="${color}" stroke="white" stroke-width="1.5"/><circle cx="14" cy="14" r="5" fill="white"/></svg>`;};
  const pinColor=v=>v.type==='Café'?'#2E5E3B':'#C4622D';
  const makeIcon=(v,active=false)=>L.divIcon({html:pinSvg(active?'#E8A838':pinColor(v),active?1.3:1),className:'',iconAnchor:active?[18,47]:[14,36],popupAnchor:[0,-38]});
  const popupHtml=v=>`<div style="font-family:'DM Sans',sans-serif;min-width:200px;padding:2px"><div style="height:72px;background:${v.imgGrad};border-radius:8px;margin-bottom:9px"></div><div style="font-family:'Playfair Display',serif;font-weight:600;font-size:14px;color:#1A1714;margin-bottom:2px">${v.name}</div><div style="display:flex;align-items:center;gap:4px;margin-bottom:2px"><span style="color:#F5C518;font-size:12px">${'★'.repeat(Math.round(v.rating))}${'☆'.repeat(5-Math.round(v.rating))}</span><span style="font-size:11px;font-weight:600;color:#1A1714">${v.rating}</span></div><div style="font-size:11px;color:#9C9390;margin-bottom:5px">${v.type}·${v.hood}·${v.price}</div><div style="font-size:11px;color:#6B625E;margin-bottom:7px">📍${v.address}</div><div style="display:flex;gap:5px;margin-bottom:8px">${v.open?'<span style="background:#D7EBE0;color:#2E5E3B;font-size:10px;font-weight:600;padding:2px 7px;border-radius:9999px">●Open</span>':'<span style="background:#EDE8E4;color:#6B625E;font-size:10px;font-weight:600;padding:2px 7px;border-radius:9999px">Closed</span>'}${!v.visited?'<span style="background:#1A1714;color:white;font-size:10px;font-weight:600;padding:2px 7px;border-radius:9999px">Want to try</span>':''}</div><button onclick="window.__savourGo(${v.id})" style="width:100%;padding:7px;background:#C4622D;color:white;border:none;border-radius:7px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:12px;cursor:pointer">View venue →</button></div>`;

  React.useEffect(()=>{
    if(!mapRef.current||instRef.current)return;
    const map=L.map(mapRef.current,{center:[43.655,-79.395],zoom:13,zoomControl:true});
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'©<a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',maxZoom:19}).addTo(map);
    instRef.current=map;
    window.__savourGo=id=>{const v=venues.find(x=>x.id===id);if(v)onVenueSelect(v);};
    venues.forEach(v=>{
      const m=L.marker([v.lat,v.lng],{icon:makeIcon(v)}).addTo(map).bindPopup(popupHtml(v),{maxWidth:230,className:'savour-popup'});
      m.on('click',()=>onHighlight(v.id));
      markersRef.current[v.id]=m;
    });
    return()=>{map.remove();instRef.current=null;};
  },[]);

  React.useEffect(()=>{
    const map=instRef.current;if(!map)return;
    const filteredIds=new Set(venues.map(v=>v.id));
    [...Object.entries(markersRef.current)].forEach(([id,m])=>{
      if(filteredIds.has(Number(id))){if(!map.hasLayer(m))m.addTo(map);}
      else{map.removeLayer(m);}
    });
    // Add new markers not yet tracked
    venues.forEach(v=>{
      if(!markersRef.current[v.id]){
        const m=L.marker([v.lat,v.lng],{icon:makeIcon(v)}).addTo(map).bindPopup(popupHtml(v),{maxWidth:230,className:'savour-popup'});
        m.on('click',()=>onHighlight(v.id));
        markersRef.current[v.id]=m;
      }
    });
    window.__savourGo=id=>{const v=venues.find(x=>x.id===id);if(v)onVenueSelect(v);};
  },[venues,activeFilter]);

  React.useEffect(()=>{
    venues.forEach(v=>{const m=markersRef.current[v.id];if(m)m.setIcon(makeIcon(v,v.id===highlightId));});
    if(highlightId){const m=markersRef.current[highlightId];if(m){m.openPopup();instRef.current?.panTo(m.getLatLng(),{animate:true});}}
  },[highlightId]);

  return <div ref={mapRef} style={{width:'100%',height:'100%'}}/>;
};

  'linear-gradient(135deg,#E0967A,#C4622D)',
  'linear-gradient(135deg,#4A8B5E,#2E5E3B)',
  'linear-gradient(135deg,#E8A838,#C4622D)',

const AddVenueModal=({onClose,onAdd})=>{
  const [name,setName]=React.useState('');
  const [address,setAddress]=React.useState('');
  const [genre,setGenre]=React.useState('');
  const [price,setPrice]=React.useState('$$');
  const [tags,setTags]=React.useState('');
  const [desc,setDesc]=React.useState('');
  const [gradIdx,setGradIdx]=React.useState(0);
  const [loading,setLoading]=React.useState(false);
  const [error,setError]=React.useState('');

  const submit=async()=>{
    if(!name.trim()||!address.trim()||!genre){setError('Please fill in name, address and genre.');return;}
    setLoading(true);setError('');
    try{
      const query=encodeURIComponent(address+', Toronto, Ontario, Canada');
      const res=await fetch(`https://nominatim.openstreetmap.org/search?q=${query}&format=json&limit=1`,{headers:{'Accept-Language':'en'}});
      const data=await res.json();
      if(!data.length){setError('Address not found. Try a more specific address.');setLoading(false);return;}
      const {lat,lon,display_name}=data[0];
      const hood=display_name.split(',')[2]?.trim()||'Toronto';
      const g=GENRES.find(x=>x.id===genre);
      const newVenue={
        id:Date.now(),name:name.trim(),genre,
        type:g?.label||genre,hood,price,
        rating:0,count:0,open:true,
        tags:tags.split(',').map(t=>t.trim()).filter(Boolean),
        imgGrad:GRAD_OPTIONS[gradIdx],
        desc:desc.trim()||'Added to my journal.',
        address:address.trim(),
        lat:parseFloat(lat),lng:parseFloat(lon),
        myRating:0,visited:false,
      };
      onAdd(newVenue);
    }catch(e){setError('Could not geocode address. Check your connection.');}
    setLoading(false);
  };

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(26,23,20,0.55)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:16,animation:'fadeIn 150ms ease'}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>

        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
          <div style={{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:22,color:C.n900}}>Add a venue</div>
          <button onClick={onClose} style={{background:C.n100,border:'none',borderRadius:'50%',width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:C.n600}}><Icon name="x" size={16}/></button>
        </div>

        {[['Venue name','text',name,setName,'e.g. Kōst Restaurant'],['Address in Toronto','text',address,setAddress,'e.g. 181 Wellington St W']].map(([label,type,val,set,ph])=>(
          <div key={label} style={{marginBottom:14}}>
            <div style={{fontSize:13,fontWeight:600,color:C.n900,marginBottom:5}}>{label}</div>
            <input type={type} value={val} onChange={e=>set(e.target.value)} placeholder={ph}
              style={{width:'100%',padding:'9px 12px',border:`1.5px solid ${C.n200}`,borderRadius:8,fontFamily:"'DM Sans',sans-serif",fontSize:14,color:C.n900,outline:'none'}}
              onFocus={e=>e.target.style.borderColor=C.primary} onBlur={e=>e.target.style.borderColor=C.n200}/>
          </div>
        ))}

        <div style={{marginBottom:14}}>
          <div style={{fontSize:13,fontWeight:600,color:C.n900,marginBottom:5}}>Genre</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
            {GENRES.map(g=>(
              <button key={g.id} onClick={()=>setGenre(g.id)} style={{padding:'5px 12px',borderRadius:9999,border:`1.5px solid ${genre===g.id?g.color:C.n200}`,background:genre===g.id?g.bg:'white',color:genre===g.id?g.color:C.n700,fontSize:12,fontWeight:500,cursor:'pointer',fontFamily:"'DM Sans',sans-serif",transition:'all 120ms'}}>
                {g.emoji} {g.label}
              </button>
            ))}
          </div>
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
          <div>
            <div style={{fontSize:13,fontWeight:600,color:C.n900,marginBottom:5}}>Price</div>
            <div style={{display:'flex',gap:4}}>
              {['$','$$','$$$','$$$$'].map(p=>(
                <button key={p} onClick={()=>setPrice(p)} style={{flex:1,padding:'6px 4px',border:`1.5px solid ${price===p?C.primary:C.n200}`,background:price===p?C.primaryLight:'white',borderRadius:7,fontSize:12,fontWeight:600,color:price===p?C.primary:C.n700,cursor:'pointer',fontFamily:"'DM Sans',sans-serif"}}>{p}</button>
              ))}
            </div>
          </div>
          <div>
            <div style={{fontSize:13,fontWeight:600,color:C.n900,marginBottom:5}}>Card colour</div>
            <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
              {GRAD_OPTIONS.slice(0,6).map((g,i)=>(
                <div key={i} onClick={()=>setGradIdx(i)} style={{width:28,height:28,borderRadius:6,background:g,cursor:'pointer',outline:gradIdx===i?`2px solid ${C.primary}`:none,outlineOffset:2}}/>
              ))}
            </div>
          </div>
        </div>

        <div style={{marginBottom:14}}>
          <div style={{fontSize:13,fontWeight:600,color:C.n900,marginBottom:5}}>Tags <span style={{fontWeight:400,color:C.n400}}>(comma separated)</span></div>
          <input value={tags} onChange={e=>setTags(e.target.value)} placeholder="e.g. Sushi, Date night, Sake"
            style={{width:'100%',padding:'9px 12px',border:`1.5px solid ${C.n200}`,borderRadius:8,fontFamily:"'DM Sans',sans-serif",fontSize:14,color:C.n900,outline:'none'}}
            onFocus={e=>e.target.style.borderColor=C.primary} onBlur={e=>e.target.style.borderColor=C.n200}/>
        </div>

        <div style={{marginBottom:20}}>
          <div style={{fontSize:13,fontWeight:600,color:C.n900,marginBottom:5}}>Notes <span style={{fontWeight:400,color:C.n400}}>(optional)</span></div>
          <textarea value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Why do you want to try this place?"
            style={{width:'100%',minHeight:72,border:`1.5px solid ${C.n200}`,borderRadius:8,padding:'9px 12px',fontFamily:"'DM Sans',sans-serif",fontSize:14,color:C.n900,resize:'none',outline:'none',lineHeight:1.5}}
            onFocus={e=>e.target.style.borderColor=C.primary} onBlur={e=>e.target.style.borderColor=C.n200}/>
        </div>

        {error&&<div style={{background:'#FEF2F2',color:'#B91C1C',fontSize:13,padding:'8px 12px',borderRadius:8,marginBottom:14}}>{error}</div>}

        <button onClick={submit} disabled={loading} style={{width:'100%',padding:12,background:loading?C.n200:C.primary,color:loading?C.n400:'white',border:'none',borderRadius:10,fontFamily:"'DM Sans',sans-serif",fontWeight:600,fontSize:15,cursor:loading?'not-allowed':'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
          {loading?<><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{animation:'spin 0.8s linear infinite'}}><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4"/></svg>Finding on map…</>:<><Icon name="map-pin" size={16}/>Add to my map</>}
        </button>
      </div>
    </div>
  );
};

      <button onClick={onBack} style={{display:'flex',alignItems:'center',gap:6,background:'none',border:'none',cursor:'pointer',color:C.primary,fontFamily:"'DM Sans',sans-serif",fontWeight:500,fontSize:14,padding:'14px 0'}}>

            </svg>

// ── App ─────────────────────────────────────────────────────
const App=()=>{
  const {venues:sv,reviews:sr}=loadState();
  const [venues,setVenues]=React.useState(sv);
  const [reviews,setReviews]=React.useState(sr);
  const init=JSON.parse(localStorage.getItem('sav_screen')||'{"screen":"map"}');
  const initScreen=['venue','review'].includes(init.screen)?'map':(init.screen||'map');
  const [screen,setScreen]=React.useState(initScreen);
  const [venue,setVenue]=React.useState(null);
  const isMobile=useWindowSize()<768;

  const go=(s,v=null)=>{setScreen(s);setVenue(v);localStorage.setItem('sav_screen',JSON.stringify({screen:s}));};

  const addVenue=v=>{const next=[...venues,v];setVenues(next);saveVenues(next);};
  const addReview=r=>{
    const next=[...reviews,r];setReviews(next);saveReviews(next);
    // Mark venue as visited
    const vNext=venues.map(v=>v.id===r.venueId?{...v,visited:true,count:v.count+1,myRating:r.rating,rating:r.rating}:v);
    setVenues(vNext);saveVenues(vNext);
  };

  return(
    <div style={{minHeight:'100vh',background:C.n100,paddingBottom:isMobile?56:0}}>
      {!isMobile&&<NavBar screen={screen} onNav={s=>go(s)}/>}
      {screen==='map'    &&<MapScreen venues={venues} onVenueSelect={v=>go('venue',v)} onAddVenue={addVenue}/>}
      {screen==='venue'  &&venue&&<VenueScreen venue={venue} reviews={reviews} onBack={()=>go('map')} onWriteReview={()=>go('review',venue)}/>}
      {screen==='review' &&venue&&<WriteReviewScreen venue={venue} onBack={()=>go('venue',venue)} onSave={r=>{addReview(r);}}/>}
      {screen==='genres' &&<GenresScreen venues={venues} onVenueSelect={v=>go('venue',v)}/>}
      {screen==='journal'&&<JournalScreen venues={venues} reviews={reviews} onVenueSelect={v=>go('venue',v)}/>}
      {isMobile&&<NavBar screen={screen} onNav={s=>go(s)}/>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
